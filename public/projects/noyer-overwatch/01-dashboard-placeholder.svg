<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-label="Noyer Overwatch dashboard placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#1d0f2a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9b5cff"/>
      <stop offset="1" stop-color="#f2c94c"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="900" rx="48" fill="url(#bg)"/>
  <rect x="70" y="70" width="1060" height="760" rx="28" fill="#0f172a" stroke="#2a2f3a" stroke-width="2"/>

  <!-- header -->
  <rect x="70" y="70" width="1060" height="88" rx="28" fill="#111827"/>
  <rect x="96" y="98" width="240" height="28" rx="14" fill="url(#accent)" opacity="0.22"/>
  <rect x="920" y="98" width="184" height="28" rx="14" fill="url(#accent)" opacity="0.18"/>

  <!-- cards -->
  <rect x="96" y="190" width="330" height="130" rx="22" fill="#0b1020" stroke="#2a2f3a" stroke-width="2"/>
  <rect x="446" y="190" width="330" height="130" rx="22" fill="#0b1020" stroke="#2a2f3a" stroke-width="2"/>
  <rect x="796" y="190" width="308" height="130" rx="22" fill="#0b1020" stroke="#2a2f3a" stroke-width="2"/>

  <!-- table -->
  <rect x="96" y="350" width="1008" height="454" rx="22" fill="#0b1020" stroke="#2a2f3a" stroke-width="2"/>
  <rect x="120" y="380" width="960" height="40" rx="14" fill="#111827"/>
  <g opacity="0.45">
    <rect x="120" y="440" width="960" height="20" rx="10" fill="#1f2937"/>
    <rect x="120" y="480" width="860" height="20" rx="10" fill="#1f2937"/>
    <rect x="120" y="520" width="920" height="20" rx="10" fill="#1f2937"/>
    <rect x="120" y="560" width="780" height="20" rx="10" fill="#1f2937"/>
    <rect x="120" y="600" width="910" height="20" rx="10" fill="#1f2937"/>
    <rect x="120" y="640" width="860" height="20" rx="10" fill="#1f2937"/>
    <rect x="120" y="680" width="920" height="20" rx="10" fill="#1f2937"/>
  </g>

  <!-- label -->
  <text x="600" y="855" text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial"
    font-size="22" font-weight="600" fill="#e5e7eb" opacity="0.75">
    Dashboard screenshots coming soon
  </text>
</svg>

